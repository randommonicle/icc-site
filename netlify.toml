[build]
  # Phase 1 cutover (D-001/D-013): build the Astro public site and publish it.
  # admin.html stays canonical at the repo root and is copied into the publish
  # dir at build time, so there is no second copy to drift. Functions unchanged.
  command = "npm install --prefix site && npm run build --prefix site && cp admin.html site/dist/admin.html"
  publish = "site/dist"
  functions = "server/netlify/functions"

# Pin Node 24 for the build AND the Functions runtime (AWS Lambda nodejs24.x).
# Node 20 reached end-of-life on 30 Apr 2026; Node 24 is LTS until Apr 2028.
# This NODE_VERSION takes precedence over .nvmrc and package.json "engines".
[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/bookings"
  to = "/.netlify/functions/bookings"
  status = 200

[[redirects]]
  from = "/api/handoffs"
  to = "/.netlify/functions/handoffs"
  status = 200

# Phase 2, Slice 3 — versioned API (/api/v1/*). Stateless server-side quote;
# runs alongside the live /api/chat flow (D-003/D-011/D-012).
[[redirects]]
  from = "/api/v1/quote"
  to = "/.netlify/functions/v1-quote"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Baseline security headers on every response. CSP is intentionally omitted
# until the inline event handlers in index.html/admin.html are refactored —
# adding it now would break the site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(self), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Admin dashboard: no caching (keep bookings fresh) and no indexing
[[headers]]
  for = "/admin*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"
