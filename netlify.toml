[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/bookings"
  to = "/.netlify/functions/bookings"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Baseline security headers on every response. CSP is intentionally omitted
# until the inline event handlers in index.html/admin.html are refactored —
# adding it now would break the site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(self), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Admin dashboard: no caching (keep bookings fresh) and no indexing
[[headers]]
  for = "/admin*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"
